name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["Student Dashboard CI/CD Pipeline"]
    types:
      - completed

env:
  JFROG_REPO: student-dashboard

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "Starting Deployment..."

            APP_DIR=/home/ubuntu/app
            BACKUP_DIR=/home/ubuntu/backup

            mkdir -p $APP_DIR
            mkdir -p $BACKUP_DIR

            cd $APP_DIR

            # =========================
            # FETCH LATEST ARTIFACT
            # =========================
            echo "Fetching latest artifact..."

            LATEST_FILE=$(curl -s -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
              "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/" \
              | grep -o 'app-[0-9.]*.zip' | sort -V | tail -n 1)

            if [ -z "$LATEST_FILE" ]; then
              echo "No artifact found"
              exit 1
            fi

            echo "Latest artifact: $LATEST_FILE"

            # =========================
            # BACKUP CURRENT VERSION
            # =========================
            if [ -f current.zip ]; then
              cp current.zip $BACKUP_DIR/backup_$(date +%s).zip
              echo "Backup created"
            fi

            # =========================
            # DOWNLOAD NEW VERSION
            # =========================
            curl -f -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
              -O "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/$LATEST_FILE"

            mv $LATEST_FILE current.zip

            # =========================
            # DEPLOY NEW VERSION
            # =========================
            echo "Deploying application..."

            rm -rf app venv
            unzip -o current.zip

            python3 -m venv venv
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt
            pip install gunicorn

            # =========================
            # STOP OLD APP
            # =========================
            PID=$(lsof -t -i:5000 || true)
            if [ ! -z "$PID" ]; then
              kill -9 $PID || true
              echo "Stopped old app ($PID)"
            fi

            # =========================
            # START APP
            # =========================
            nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

            echo "Waiting for app startup..."
            sleep 10

            # =========================
            # HEALTH + API VALIDATION
            # =========================
            SUCCESS=false

            for i in {1..12}; do
              sleep 5

              HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" http://localhost:5000/health || true)
              BODY=$(cat response.txt || true)

              echo "Attempt $i → HTTP: $HTTP_CODE | Body: $BODY"

              # HEALTH CHECK
              if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q "UP"; then

                # API CHECK (basic validation)
                API_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/students || true)

                if [ "$API_CHECK" = "200" ]; then
                  SUCCESS=true
                  break
                fi
              fi
            done

            # =========================
            # SUCCESS PATH
            # =========================
            if [ "$SUCCESS" = true ]; then
              echo "Deployment successful"
              exit 0
            fi

            # =========================
            # FAILURE PATH
            # =========================
            echo "Deployment failed"

            echo "App Logs:"
            tail -n 50 app.log || true

            # =========================
            # ROLLBACK
            # =========================
            if [ ! -d "$BACKUP_DIR" ] || [ -z "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
              echo "No backup available. Cannot rollback."
              exit 1
            fi

            echo "Rolling back..."

            LAST_BACKUP=$(ls -t $BACKUP_DIR | head -n 1)

            cp $BACKUP_DIR/$LAST_BACKUP current.zip

            rm -rf app venv
            unzip -o current.zip

            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            pip install gunicorn

            nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

            echo "Rollback completed"
            exit 1
