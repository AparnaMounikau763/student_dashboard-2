name: CD - Deploy to EC2

on:
workflow_run:
workflows: ["Student Dashboard CI/CD Pipeline"]
types:
- completed

env:
JFROG_REPO: student-dashboard

jobs:
deploy:
if: ${{ github.event.workflow_run.conclusion == 'success' }}
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to EC2 via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_SSH_KEY }}

      script: |
        set -e

        echo " Starting Deployment..."

        APP_DIR=/home/ubuntu/app
        BACKUP_DIR=/home/ubuntu/backup

        mkdir -p $APP_DIR
        mkdir -p $BACKUP_DIR

        cd $APP_DIR

        # =========================
        # FETCH LATEST ARTIFACT
        # =========================
        echo " Fetching latest artifact..."

        LATEST_FILE=$(curl -s -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
          "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/" \
          | grep -o 'app-[0-9.]*.zip' | sort -V | tail -n 1)

        echo "Latest file: $LATEST_FILE"

        if [ -z "$LATEST_FILE" ]; then
          echo " No artifact found!"
          exit 1
        fi

        # =========================
        # BACKUP CURRENT VERSION
        # =========================
        if [ -f current.zip ]; then
          cp current.zip $BACKUP_DIR/backup_$(date +%s).zip
          echo " Backup created"
        fi

        # =========================
        # DOWNLOAD NEW VERSION
        # =========================
        echo "Downloading artifact..."

        curl -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }}" \
          -O "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/$LATEST_FILE"

        mv $LATEST_FILE current.zip

        # =========================
        # DEPLOY
        # =========================
        echo "⚙️ Deploying..."

        rm -rf app venv
        unzip -o current.zip
        
        # CREATE VIRTUAL ENV
        python3 -m venv venv
        source venv/bin/activate

        #INSTALL DEPENDENCIES
        pip install --upgrade pip
        pip install -r requirements.txt

        # STOP OLD APP
        pkill -f "gunicorn" || true
        pkill -f "run.py" || true

        # START NEW APP (GUNICORN)
        nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

        sleep 5

        # =========================
        # HEALTH CHECK
        # =========================
        echo "Checking health..."

        STATUS=$(curl -s http://localhost:5000/health | grep ok || true)

        if [ -z "$STATUS" ]; then
          echo " Deployment failed. Rolling back..."

          LAST_BACKUP=$(ls -t $BACKUP_DIR | head -n 1)

          if [ -z "$LAST_BACKUP" ]; then
            echo "No backup found!"
            exit 1
          fi

          echo "Restoring $LAST_BACKUP"

          cp $BACKUP_DIR/$LAST_BACKUP current.zip
          rm -rf app venv
          unzip -o current.zip

          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

          pkill -f "gunicorn" || true
          nohup bash -c "source venv/bin/activate && gunicorn -w 4 -b 0.0.0.0:5000 run:app" > app.log 2>&1 &

          echo "Rolled back successfully"
          exit 1
        fi

        echo " Deployment successful!"
