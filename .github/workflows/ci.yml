name: Student Dashboard CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: student-dashboard
  JFROG_REPO: student-dashboard

jobs:

# =========================
# JOB 1: SETUP
# =========================
  setup:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage pylint

      # =========================
      # VERSION HANDLING
      # =========================
      - name: Read Version
        id: get_version
        run: |
          VERSION=$(cat version.txt)
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT


# =========================
# JOB 2: ANALYZE (LINT + SONAR)
# =========================
  analyze:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Tools
        run: |
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov coverage

      - name: Run Lint
        run: pylint app || true

      - name: Generate Coverage XML
        run: pytest --cov=app --cov-report=xml

      - name: Sonar Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=AparnaMounikau763_student_dashboard-2
            -Dsonar.organization=aparnamounikau763
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.10


# =========================
# JOB 3: BUILD
# =========================
  build:
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          mkdir dist
          cp -r app dist/
          cp requirements.txt dist/


# =========================
# JOB 4: TEST
# =========================
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Clean coverage
        run: |
          rm -f .coverage
          rm -rf htmlcov

      - name: Run Auth Tests
        run: pytest -v tests/test_auth.py --cov=app --cov-append

      - name: Run API Tests
        run: pytest -v tests/test_api.py --cov=app --cov-append

      - name: Run Search Tests
        run: pytest -v tests/test_search.py --cov=app --cov-append

      - name: Run Performance Tests
        run: pytest -v tests/test_performance.py --cov=app --cov-append

      - name: Enforce Coverage >= 90%
        run: coverage report --fail-under=90

      - name: Generate HTML Coverage
        run: coverage html


# =========================
# JOB 5: PACKAGE + JFROG (WITH VERSION)
# =========================
  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Get version from setup job
      - name: Get Version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Package Artifact
        run: |
          zip -r app-${VERSION}.zip app requirements.txt

      - name: Upload to JFrog
        run: |
          curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }} \
          -T app-${VERSION}.zip \
          "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/app-${VERSION}.zip"
