name: Student Dashboard CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: student-dashboard
  JFROG_REGISTRY: ${{ secrets.JFROG_REGISTRY }}
  JFROG_REPO: student-dashboard
  PYTHON_VERSION: "3.10"

jobs:

# =========================
# JOB 1: SETUP
# =========================
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

# =========================
# JOB 2: ANALYZE (LINT + SONAR)
# =========================
  analyze:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dev Dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov coverage

      # LINT
      - name: Run Pylint
        run: pylint app || true

      # GENERATE COVERAGE FOR SONAR
      - name: Generate Coverage XML
        run: pytest --cov=app --cov-report=xml

      # OPTIONAL DEBUG (can remove later)
      - name: Debug Sonar Access
        run: |
          curl -u ${{ secrets.SONAR_TOKEN }}: https://sonarcloud.io/api/system/status

      # SONAR SCAN
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=AparnaMounikau763_student_dashboard-22
            -Dsonar.organization=aparnamounikau763
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.version=3.10
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # QUALITY GATE
      - name: Sonar Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# =========================
# JOB 3: BUILD
# =========================
  build:
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          mkdir dist
          cp -r app dist/
          cp requirements.txt dist/

# =========================
# JOB 4: TEST (COVERAGE ≥ 90%)
# =========================
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Test Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Clean Coverage
        run: |
          rm -f .coverage
          rm -rf htmlcov

      # -----------------------
      # STAGE-WISE TESTING
      # -----------------------
      - name: Run Auth Tests
        run: pytest -v tests/test_auth.py --cov=app --cov-append

      - name: Run API Tests
        run: pytest -v tests/test_api.py --cov=app --cov-append

      - name: Run Search Tests
        run: pytest -v tests/test_search.py --cov=app --cov-append

      - name: Run Performance Tests
        run: pytest -v tests/test_performance.py --cov=app --cov-append

      # -----------------------
      # COVERAGE VALIDATION
      # -----------------------
      - name: Enforce Coverage >= 90%
        run: coverage report --fail-under=90

      - name: Generate HTML Coverage
        run: coverage html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

# =========================
# JOB 5: PACKAGE + UPLOAD TO JFROG
# =========================
  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package Artifact
        run: zip -r app.zip app requirements.txt

      - name: Upload to JFrog
        run: |
          curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }} \
          -T app.zip \
          "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/app.zip"