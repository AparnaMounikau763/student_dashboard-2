name: Student Dashboard CI/CD Pipeline

on:
  push:
    branches: ["main"]

#  REQUIRED FOR TAG PUSH / GIT WRITE ACCESS
permissions:
  contents: write

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: student-dashboard
  JFROG_REPO: student-dashboard

jobs:

# =========================
# JOB 1: SETUP
# =========================
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage pylint


# =========================
# JOB 2: ANALYZE (LINT + SONAR)
# =========================
  analyze:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Tools
        run: |
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov coverage

      - name: Run Lint
        run: pylint app || true

      - name: Generate Coverage XML
        run: pytest --cov=app --cov-report=xml

      - name: Sonar Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=AparnaMounikau763_student_dashboard-2
            -Dsonar.organization=aparnamounikau763
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.10


# =========================
# JOB 3: BUILD
# =========================
  build:
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          mkdir dist
          cp -r app dist/
          cp requirements.txt dist/


# =========================
# JOB 4: TEST
# =========================
  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Clean coverage
        run: |
          rm -f .coverage
          rm -rf htmlcov

      - name: Run Auth Tests
        run: pytest -v tests/test_auth.py --cov=app --cov-append

      - name: Run API Tests
        run: pytest -v tests/test_api.py --cov=app --cov-append

      - name: Run Search Tests
        run: pytest -v tests/test_search.py --cov=app --cov-append

      - name: Run Performance Tests
        run: pytest -v tests/test_performance.py --cov=app --cov-append

      - name: Enforce Coverage >= 90%
        run: coverage report --fail-under=90

      - name: Generate HTML Coverage
        run: coverage html


# =========================
# JOB 5: PUBLISH (AUTO VERSION + JFROG + TAGGING)
# =========================
  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # AUTO VERSIONING
      # =========================
      - name: Generate Version Automatically
        id: versioning
        run: |
          git fetch --tags

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "Latest tag: $LATEST_TAG"

          MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)

          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if [[ "$MSG" == BREAK:* ]]; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0
          elif [[ "$MSG" == feat:* ]]; then
            MINOR=$((MINOR+1))
            PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version = $VERSION"

      # =========================
      # PACKAGE ARTIFACT
      # =========================
      - name: Package Artifact
        run: |
          zip -r app-${NEW_VERSION}.zip app run.py requirements.txt

      # =========================
      # UPLOAD TO JFROG
      # =========================
      - name: Upload to JFrog
        run: |
          curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASSWORD }} \
          -T app-${NEW_VERSION}.zip \
          "https://${{ secrets.JFROG_REGISTRY }}/artifactory/${{ env.JFROG_REPO }}/app-${NEW_VERSION}.zip"

      # =========================
      # CREATE GIT TAG (FIXED 403 ISSUE)
      # =========================
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $NEW_VERSION

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $NEW_VERSION
